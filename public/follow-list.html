<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关注列表 - 校园论坛</title>
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/follow-list.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">
        <i class="fas fa-comments"></i>
        <h1>校园论坛</h1>
      </div>
      <div class="header-search">
        <div class="search-box-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" id="search-input" placeholder="搜索帖子内容或用户..." autocomplete="off">
          <button class="search-clear-btn" id="search-clear-btn" style="display: none;">
            <i class="fas fa-times"></i>
          </button>
          <button type="button" class="search-btn" id="search-btn">搜索</button>
          <div class="search-history" id="search-history" style="display: none;">
            <div class="search-history-header">
              <span>搜索历史</span>
              <button class="clear-history-btn" id="clear-history-btn">清空</button>
            </div>
            <div class="search-history-list" id="search-history-list"></div>
          </div>
        </div>
      </div>
      <div class="notification-area" id="notificationArea"></div>
      <div id="user-actions">
        <!-- 用户头像（登录后显示） -->
        <div id="header-user-avatar" class="header-user-avatar" style="display: none;">
          <i class="fas fa-user-circle"></i>
          <div class="header-user-dropdown">
            <div class="header-user-info">
              <div class="header-user-name" id="header-username">用户名</div>
              <div class="header-user-class" id="header-user-class">班级信息</div>
            </div>
            <div class="header-user-menu">
              <a href="profile.html" class="header-menu-item">
                <i class="fas fa-user"></i> 个人资料
              </a>
              <a href="favorites.html" class="header-menu-item">
                <i class="fas fa-star"></i> 我的收藏
              </a>
              <a href="following.html" class="header-menu-item">
                <i class="fas fa-users"></i> 我的关注
              </a>
              <a href="settings.html" class="header-menu-item">
                <i class="fas fa-cog"></i> 设置
              </a>
              <a href="message.html" class="header-menu-item">
                <i class="fas fa-bell"></i> 消息
              </a>
              <div class="header-menu-divider"></div>
              <button id="header-logout-btn" class="header-menu-item logout">
                <i class="fas fa-sign-out-alt"></i> 退出登录
              </button>
            </div>
          </div>
        </div>
        
        <!-- 更新动态按钮（登录后显示） -->
        <div id="header-updates-btn" class="header-icon-btn" style="display: none;" title="更新动态">
          <a href="following.html">
            <i class="fas fa-rss"></i>
            <span id="updates-badge" class="updates-badge">0</span>
          </a>
        </div>
        
        <!-- 登录/注册按钮（未登录时显示） -->
        <button id="login-btn"><i class="fas fa-sign-in-alt"></i> 登录</button>
        <button id="register-btn"><i class="fas fa-user-plus"></i> 注册</button>
      </div>
    </div>
  </header>
  
  <div class="container">
    <div class="main-content">
      <div>
        <!-- 返回按钮 -->
        <div class="back-button-container">
          <a href="index.html" class="back-button" id="back-btn">
            <i class="fas fa-arrow-left"></i> 返回首页
          </a>
        </div>
        
        <!-- 用户信息卡片 -->
        <div class="user-info-card">
          <div class="user-info-avatar" id="user-avatar">
            <!-- 通过JS动态生成 -->
          </div>
          <div class="user-info-content">
            <h2 id="user-username">加载中...</h2>
            <p id="user-class">加载中...</p>
          </div>
          <a href="#" id="view-profile-btn" class="view-profile-btn">
            <i class="fas fa-user"></i> 查看主页
          </a>
        </div>
        
        <!-- 关注/粉丝列表页面 -->
        <div class="follow-list-section">
          <div class="follow-list-header">
            <h2 class="section-title" id="list-title">
              <i class="fas fa-users"></i> 列表
              <span class="list-count" id="list-count">(0)</span>
            </h2>
            <div class="follow-tabs">
              <button class="follow-tab-btn" data-type="following" id="following-tab">
                <i class="fas fa-user-plus"></i> 关注
                <span id="following-count">0</span>
              </button>
              <button class="follow-tab-btn" data-type="followers" id="followers-tab">
                <i class="fas fa-users"></i> 粉丝
                <span id="followers-count">0</span>
              </button>
            </div>
          </div>
          
          <!-- 用户列表 -->
          <div class="follow-list-container" id="follow-list-container">
            <div class="loading">
              <i class="fas fa-spinner fa-spin"></i> 加载中...
            </div>
          </div>
          
          <!-- 分页 -->
          <div class="pagination-container" id="pagination-container" style="display: none;">
            <button class="pagination-btn" id="prev-btn" disabled>
              <i class="fas fa-chevron-left"></i> 上一页
            </button>
            <span class="pagination-info" id="pagination-info">第 1 页</span>
            <button class="pagination-btn" id="next-btn">
              下一页 <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>
      
      <!-- 侧边栏 -->
      <div class="sidebar">
        <!-- 用户面板 -->
        <div class="user-panel" id="user-panel">
          <div class="user-avatar">
            <i class="fas fa-user-circle"></i>
          </div>
          <div class="user-info">
            <h3 id="username">访客</h3>
            <div id="user-class">请登录查看信息</div>
          </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="statistics-card">
          <h2 class="stat-title">论坛数��统计</h2>
          <div class="stat-item">
            <span>今日发帖</span>
            <span id="today-posts" class="stat-value">0</span>
          </div>
          <div class="stat-item">
            <span>总用户数</span>
            <span id="total-users" class="stat-value">0</span>
          </div>
          <div class="stat-item">
            <span>总帖子数</span>
            <span id="total-posts" class="stat-value">0</span>
          </div>
          <div class="stat-item">
            <span>总评论数</span>
            <span id="total-comments" class="stat-value">0</span>
          </div>
        </div>
        
        <!-- 论坛指南 -->
        <div class="guidelines-card">
          <h2 class="section-title">校园论坛指南</h2>
          <ul class="guidelines-list">
            <li>
              <i class="fas fa-check-circle"></i>
              <div>请提供准确的学校和班级信息，便于同学交流</div>
            </li>
            <li>
              <i class="fas fa-check-circle"></i>
              <div>尊重他人，文明发言，共同维护良好的交流环境</div>
            </li>
            <li>
              <i class="fas fa-check-circle"></i>
              <div>使用匿名功能时仍需遵守论坛规范</div>
            </li>
            <li>
              <i class="fas fa-check-circle"></i>
              <div>禁止发布涉及敏感内容的帖子</div>
            </li>
            <li>
              <i class="fas fa-check-circle"></i>
              <div>遇到问题可向版主反馈</div>
            </li>
          </ul>
        </div>
        
        <!-- 通知 -->
        <div class="notification">
          <i class="fas fa-info-circle"></i> 
          提示：关注感兴趣的用户，第一时间看到他们的最新动态！
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/utils.js"></script>
  <script src="js/user.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/follow-list.js"></script>
  <script>
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 初始化用户管理
      userManager.init();
      
      // 初始化统计
      statsManager.init();
      
      // 初始化关注列表页面
      followListManager.init();
      
      // 设置登录/注册按钮事件
      userManager.setupEventListeners();
    });
  </script>
</body>
</html>
