<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全部栏目 - 校园论坛</title>
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/categories.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">
        <a href="/"><i class="fas fa-comments"></i><h1>校园论坛</h1></a>
      </div>
      <div class="header-search">
        <div class="search-box-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" id="search-input" placeholder="搜索栏目..." autocomplete="off">
          <button type="button" class="search-clear-btn" id="search-clear-btn" style="display: none;">
            <i class="fas fa-times"></i>
          </button>
          <button type="button" class="search-btn" id="search-btn">搜索</button>
        </div>
      </div>
      <div class="notification-area" id="notificationArea"></div>
      <div id="user-actions">
        <div id="header-user-avatar" class="header-user-avatar" style="display: none;">
          <i class="fas fa-user-circle"></i>
          <div class="header-user-dropdown">
            <div class="header-user-info">
              <div class="header-user-name" id="header-username">用户名</div>
              <div class="header-user-class" id="header-user-class">班级</div>
            </div>
            <div class="header-user-menu">
              <a href="profile.html" class="header-menu-item"><i class="fas fa-user"></i> 个人资料</a>
              <a href="favorites.html" class="header-menu-item"><i class="fas fa-star"></i> 我的收藏</a>
              <a href="following.html" class="header-menu-item"><i class="fas fa-users"></i> 我的关注</a>
              <a href="settings.html" class="header-menu-item"><i class="fas fa-cog"></i> 设置</a>
              <a href="message.html" class="header-menu-item"><i class="fas fa-bell"></i> 消息通知</a>
              <a href="chat.html" class="header-menu-item"><i class="fas fa-envelope"></i> 私信</a>
              <div class="header-menu-divider"></div>
              <button id="header-logout-btn" class="header-menu-item logout"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
            </div>
          </div>
        </div>
        <div id="header-updates-btn" class="header-icon-btn" style="display: none;">
          <a href="following.html"><i class="fas fa-rss"></i><span id="updates-badge" class="updates-badge">0</span></a>
        </div>
        <div id="header-chat-btn" class="header-icon-btn" style="display: none;">
          <a href="chat.html"><i class="fas fa-envelope"></i><span id="chat-badge" class="message-badge" style="display:none;">0</span></a>
        </div>
        <button id="login-btn"><i class="fas fa-sign-in-alt"></i> 登录</button>
        <button id="register-btn"><i class="fas fa-user-plus"></i> 注册</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="main-content">
      <!-- 页面标题 -->
      <div class="categories-page-header">
        <a href="/" class="back-home-btn"><i class="fas fa-arrow-left"></i> 返回首页</a>
        <h1><i class="fas fa-layer-group"></i> 全部栏目</h1>
        <p class="categories-page-desc">选择一个栏目，开始浏览感兴趣的帖子</p>
      </div>

      <!-- 栏目网格 -->
      <div class="categories-grid" id="categories-grid">
        <div class="categories-loading">
          <i class="fas fa-spinner fa-spin"></i> 加载栏目中...
        </div>
      </div>
    </div>
  </div>

  <!-- 申请栏目模态框 -->
  <div id="applyCategoryModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2><i class="fas fa-plus-circle"></i> 申请新栏目</h2>
        <button class="modal-close" onclick="closeApplyCategoryModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="apply-category-name"><i class="fas fa-tag"></i> 栏目名称</label>
          <input type="text" id="apply-category-name" placeholder="请输入栏目名称（2-20字）" maxlength="20">
        </div>
        <div class="form-group">
          <label for="apply-category-desc"><i class="fas fa-align-left"></i> 栏目描述</label>
          <textarea id="apply-category-desc" placeholder="请简单描述栏目的定位和内容（10-200字）" maxlength="200" rows="4"></textarea>
        </div>
        <div id="apply-category-status" class="save-status" style="display: none;"></div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeApplyCategoryModal()">取消</button>
          <button type="button" id="apply-category-submit-btn" class="btn-primary" onclick="submitApplyCategory()">
            <i class="fas fa-paper-plane"></i> 提交申请
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 通知容器 -->
  <div id="notificationArea" class="notification-area"></div>

  <!-- 通用图片预览模态框 -->
  <div id="image-modal" class="image-modal" style="display: none;">
    <span class="image-modal-close">&times;</span>
    <img id="image-modal-img" class="image-modal-content" alt="预览图片">
    <div id="image-modal-caption"></div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/user.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/category.js"></script>
  <script src="/js/categories.js"></script>
</body>
</html>
