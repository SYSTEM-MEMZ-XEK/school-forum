<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>栏目 - 校园论坛</title>
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/post-detail.css">
  <!-- Markdown-it 渲染支持 -->
  <script defer src="/libs/markdown-it/markdown-it.min.js"></script>
  <link rel="stylesheet" href="/libs/highlight.js/styles/github-dark.min.css">
  <script src="/libs/highlight.js/highlight.min.js"></script>
  <!-- MathJax -->
  <script src="/js/mathjax-config.js"></script>
  <script id="MathJax-script" src="/libs/mathjax/tex-svg-full.js"></script>
  <script src="/js/highlight-init.js"></script>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">
        <a href="/"><i class="fas fa-comments"></i><h1>校园论坛</h1></a>
      </div>
      <div class="header-search">
        <div class="search-box-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" id="search-input" placeholder="搜索栏目内帖子..." autocomplete="off">
          <button class="search-btn" id="search-btn">搜索</button>
        </div>
      </div>
      <div class="notification-area" id="notificationArea"></div>
      <div id="user-actions">
        <div id="header-user-avatar" class="header-user-avatar" style="display: none;">
          <i class="fas fa-user-circle"></i>
          <div class="header-user-dropdown">
            <div class="header-user-info">
              <div class="header-user-name" id="header-username">用户名</div>
              <div class="header-user-class" id="header-user-class">班级</div>
            </div>
            <div class="header-user-menu">
              <a href="profile.html" class="header-menu-item"><i class="fas fa-user"></i> 个人资料</a>
              <a href="favorites.html" class="header-menu-item"><i class="fas fa-star"></i> 我的收藏</a>
              <a href="following.html" class="header-menu-item"><i class="fas fa-users"></i> 我的关注</a>
              <a href="settings.html" class="header-menu-item"><i class="fas fa-cog"></i> 设置</a>
              <a href="message.html" class="header-menu-item"><i class="fas fa-bell"></i> 消息通知</a>
              <a href="chat.html" class="header-menu-item"><i class="fas fa-envelope"></i> 私信</a>
              <div class="header-menu-divider"></div>
              <button id="header-logout-btn" class="header-menu-item logout"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
            </div>
          </div>
        </div>
        <div id="header-updates-btn" class="header-icon-btn" style="display: none;">
          <a href="following.html"><i class="fas fa-rss"></i><span id="updates-badge" class="updates-badge">0</span></a>
        </div>
        <div id="header-chat-btn" class="header-icon-btn" style="display: none;">
          <a href="chat.html"><i class="fas fa-envelope"></i><span id="chat-badge" class="message-badge" style="display:none;">0</span></a>
        </div>
        <button id="login-btn"><i class="fas fa-sign-in-alt"></i> 登录</button>
        <button id="register-btn"><i class="fas fa-user-plus"></i> 注册</button>
      </div>
    </div>
  </header>

  <div class="container">
    <!-- 栏目头部 -->
    <div class="category-header" id="category-header">
      <div class="category-header-info">
        <div class="category-icon" id="category-icon">
          <i class="fas fa-folder"></i>
        </div>
        <div class="category-details">
          <h1 id="category-name">加载中...</h1>
          <p id="category-description"></p>
        </div>
      </div>
      <div class="category-header-actions">
        <a href="/" class="back-home-btn"><i class="fas fa-arrow-left"></i> 返回首页</a>
        <button id="apply-category-btn" class="apply-category-btn" style="display: none;">
          <i class="fas fa-plus"></i> 申请新栏目
        </button>
      </div>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
      <div>
        <!-- 栏目导航 -->
        <div class="category-nav-bar" id="category-nav-bar">
          <a href="/" class="category-nav-item">
            <i class="fas fa-globe"></i> 全部
          </a>
        </div>

        <!-- 排序选项 -->
        <div class="sort-options" id="sort-options">
          <span class="sort-label">排序：</span>
          <div class="sort-buttons">
            <button class="sort-btn active" data-sort="latest">最新</button>
            <button class="sort-btn" data-sort="hot">热门</button>
          </div>
        </div>

        <!-- 搜索结果提示 -->
        <div class="search-results-info" id="search-results-info" style="display: none;">
          <span id="search-keyword"></span>
          <button class="clear-search-btn" id="clear-search-btn">清除搜索</button>
        </div>

        <!-- 帖子列表 -->
        <div class="posts-list" id="posts-container">
          <div class="loading-placeholder">
            <i class="fas fa-spinner fa-spin"></i> 加载中...
          </div>
        </div>

        <!-- 加载更多 -->
        <div class="load-more-container" id="load-more-container" style="display: none;">
          <button id="load-more-btn" class="load-more-btn">加载更多</button>
        </div>

        <!-- 无帖子提示 -->
        <div id="empty-state" class="empty-state" style="display: none;">
          <i class="fas fa-inbox"></i>
          <p>该栏目暂无帖子</p>
          <a href="/" class="btn-link">返回首页</a>
        </div>
      </div>

      <!-- 侧边栏 -->
      <div class="sidebar">
        <div class="sidebar-card">
          <h3><i class="fas fa-layer-group"></i> 全部栏目</h3>
          <div class="category-list" id="sidebar-category-list">
            <div class="loading-placeholder" style="font-size: 0.9em;"><i class="fas fa-spinner fa-spin"></i></div>
          </div>
        </div>
        <div class="sidebar-card">
          <h3><i class="fas fa-bullhorn"></i> 发起申请</h3>
          <p class="sidebar-hint">没找到想要的栏目？发起申请，让管理员创建！</p>
          <button id="apply-sidebar-btn" class="sidebar-apply-btn">
            <i class="fas fa-plus"></i> 申请新栏目
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 申请栏目模态框 -->
  <div id="apply-category-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3><i class="fas fa-plus"></i> 申请新栏目</h3>
        <button class="modal-close" onclick="closeApplyModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="apply-category-name">栏目名称 <span class="required">*</span></label>
          <input type="text" id="apply-category-name" placeholder="例如：学习方法、校园活动、二手交易" maxlength="30">
          <small class="form-hint">最多30个字符</small>
        </div>
        <div class="form-group">
          <label for="apply-category-desc">申请理由</label>
          <textarea id="apply-category-desc" placeholder="请简要说明为什么需要这个栏目..." maxlength="500" rows="4"></textarea>
          <small class="form-hint">最多500个字符</small>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn cancel" onclick="closeApplyModal()">取消</button>
        <button id="submit-apply-btn" class="modal-btn confirm"><i class="fas fa-paper-plane"></i> 提交申请</button>
      </div>
    </div>
  </div>

  <!-- 图片预览模态框 -->
  <div id="image-modal" class="image-modal" style="display: none;">
    <span class="image-modal-close">&times;</span>
    <img class="image-modal-content" id="image-modal-img">
    <div id="image-modal-caption"></div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/user.js"></script>
  <script src="/js/category.js"></script>
  <script src="/js/posts.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/category-page.js"></script>
</body>
</html>
