<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏 - 校园论坛</title>
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/favorites.css">
  <!-- Markdown-it 渲染支持（本地版本） -->
  <script defer src="/libs/markdown-it/markdown-it.min.js"></script>
  <link rel="stylesheet" href="/libs/highlight.js/styles/github-dark.min.css">
  <script src="/libs/highlight.js/highlight.min.js"></script>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">
        <i class="fas fa-comments"></i>
        <h1>校园论坛</h1>
      </div>
      <div class="header-search">
        <div class="search-box-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" id="search-input" placeholder="搜索帖子内容或用户..." autocomplete="off">
          <button class="search-clear-btn" id="search-clear-btn" style="display: none;">
            <i class="fas fa-times"></i>
          </button>
          <button type="button" class="search-btn" id="search-btn">搜索</button>
          <div class="search-history" id="search-history" style="display: none;">
            <div class="search-history-header">
              <span>搜索历史</span>
              <button class="clear-history-btn" id="clear-history-btn">清空</button>
            </div>
            <div class="search-history-list" id="search-history-list"></div>
          </div>
        </div>
      </div>
      <div class="notification-area" id="notificationArea"></div>
      <div id="user-actions">
        <!-- 用户头像（登录后显示） -->
        <div id="header-user-avatar" class="header-user-avatar" style="display: none;">
          <i class="fas fa-user-circle"></i>
          <div class="header-user-dropdown">
            <div class="header-user-info">
              <div class="header-user-name" id="header-username">用户名</div>
              <div class="header-user-class" id="header-user-class">班级信息</div>
            </div>
            <div class="header-user-menu">
              <a href="profile.html" class="header-menu-item">
                <i class="fas fa-user"></i> 个人资料
              </a>
              <a href="favorites.html" class="header-menu-item">
                <i class="fas fa-star"></i> 我的收藏
              </a>
              <a href="following.html" class="header-menu-item">
                <i class="fas fa-users"></i> 我的关注
              </a>
              <a href="settings.html" class="header-menu-item">
                <i class="fas fa-cog"></i> 设置
              </a>
              <a href="message.html" class="header-menu-item">
                <i class="fas fa-bell"></i> 消息通知
              </a>
              <a href="chat.html" class="header-menu-item">
                <i class="fas fa-envelope"></i> 私信
              </a>
              <a href="blacklist.html" class="header-menu-item">
                <i class="fas fa-ban"></i> 黑名单
              </a>
              <div class="header-menu-divider"></div>
              <button id="header-logout-btn" class="header-menu-item logout">
                <i class="fas fa-sign-out-alt"></i> 退出登录
              </button>
            </div>
          </div>
        </div>
        
        <!-- 更新动态按钮（登录后显示） -->
        <div id="header-updates-btn" class="header-icon-btn" style="display: none;" title="更新动态">
          <a href="following.html">
            <i class="fas fa-rss"></i>
            <span id="updates-badge" class="updates-badge">0</span>
          </a>
        </div>
        
        <!-- 私信按钮（登录后显示） -->
        <div id="header-chat-btn" class="header-icon-btn" style="display: none;" title="私信">
          <a href="chat.html">
            <i class="fas fa-envelope"></i>
            <span id="chat-badge" class="message-badge" style="display: none;">0</span>
          </a>
        </div>
        
        <!-- 登录/注册按钮（未登录时显示） -->
        <button id="login-btn"><i class="fas fa-sign-in-alt"></i> 登录</button>
        <button id="register-btn"><i class="fas fa-user-plus"></i> 注册</button>
      </div>
    </div>
  </header>
  
  <div class="container">
    <div class="main-content">
      <div>
        <!-- 返回按钮 -->
        <div class="back-button-container">
          <a href="index.html" class="back-button">
            <i class="fas fa-arrow-left"></i> 返回首页
          </a>
        </div>
        
        <!-- 收藏页面标题 -->
        <div class="favorites-header">
          <div class="favorites-title">
            <i class="fas fa-star"></i>
            <h1>我的收藏</h1>
          </div>
          <div class="favorites-header-actions">
            <div class="favorites-count" id="favorites-count">
              共 <span>0</span> 个收藏
            </div>
            <button class="manage-btn" id="manage-btn">
              <i class="fas fa-tasks"></i> 管理
            </button>
          </div>
        </div>
        
        <!-- 管理栏 -->
        <div class="manage-bar" id="manage-bar" style="display: none;">
          <div class="manage-bar-left">
            <button class="select-all-btn" id="select-all-btn">
              <i class="fas fa-check-double"></i> 全选
            </button>
            <span class="selected-info">已选择 <span id="selected-count">0</span> 项</span>
          </div>
          <div class="manage-bar-right">
            <button class="batch-move-btn" id="batch-move-btn">
              <i class="fas fa-folder"></i> 移动到...
            </button>
            <button class="batch-delete-btn" id="batch-delete-btn">
              <i class="fas fa-trash"></i> 删除
            </button>
          </div>
        </div>
        
        <!-- 标签管理区域 -->
        <div class="tags-section">
          <div class="tags-header">
            <h3><i class="fas fa-tags"></i> 收藏分类</h3>
            <button class="add-tag-btn" id="add-tag-btn">
              <i class="fas fa-plus"></i> 新建标签
            </button>
          </div>
          <div class="tags-list" id="tags-list">
            <!-- 标签将通过JS动态加载 -->
          </div>
        </div>
        
        <!-- 收藏帖子列表 -->
        <div class="favorites-posts-section">
          <div class="favorites-posts-list" id="favorites-posts-container">
            <div class="loading" id="loading">
              <i class="fas fa-spinner fa-spin"></i> 加载中...
            </div>
          </div>
          
          <div class="empty-state" id="no-favorites-message" style="display: none;">
            <i class="fas fa-star"></i>
            <p>还没有收藏任何帖子</p>
            <p class="empty-hint">浏览帖子时点击收藏按钮即可添加收藏</p>
          </div>
          
          <!-- 加载更多 -->
          <div class="load-more-container" id="load-more-container" style="display: none;">
            <button class="load-more-btn" id="load-more-btn">
              <i class="fas fa-chevron-down"></i> 加载更多
            </button>
          </div>
        </div>
      </div>
      
      <!-- 侧边栏 -->
      <div class="sidebar">
        <!-- 用户面板 -->
        <div class="user-panel" id="user-panel">
          <div class="user-avatar">
            <i class="fas fa-user-circle"></i>
          </div>
          <div class="user-info">
            <h3 id="username">访客</h3>
            <div id="user-class">请登录查看信息</div>
          </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="statistics-card">
          <h2 class="stat-title">论坛数据统计</h2>
          <div class="stat-item">
            <span>今日发帖</span>
            <span id="today-posts" class="stat-value">0</span>
          </div>
          <div class="stat-item">
            <span>总用户数</span>
            <span id="total-users" class="stat-value">0</span>
          </div>
          <div class="stat-item">
            <span>总帖子数</span>
            <span id="total-posts" class="stat-value">0</span>
          </div>
          <div class="stat-item">
            <span>总评论数</span>
            <span id="total-comments" class="stat-value">0</span>
          </div>
        </div>
        
        <!-- 通知 -->
        <div class="notification">
          <i class="fas fa-info-circle"></i> 
          提示：点击帖子可以查看详情，在帖子详情页可以取消收藏。
        </div>
      </div>
    </div>
  </div>
  
  <!-- 标签编辑模态框 -->
  <div id="tag-modal" class="tag-modal">
    <div class="tag-modal-content">
      <div class="tag-modal-header">
        <h3 id="tag-modal-title"><i class="fas fa-tag"></i> 新建标签</h3>
        <button class="tag-modal-close" id="tag-modal-close">&times;</button>
      </div>
      <div class="tag-modal-body">
        <div class="form-group">
          <label for="tag-name">标签名称</label>
          <input type="text" id="tag-name" placeholder="输入标签名称" maxlength="20">
        </div>
        <div class="form-group">
          <label>标签颜色</label>
          <div class="color-picker">
            <div class="color-option" data-color="#4361ee" style="background: #4361ee;"></div>
            <div class="color-option" data-color="#22c55e" style="background: #22c55e;"></div>
            <div class="color-option" data-color="#f59e0b" style="background: #f59e0b;"></div>
            <div class="color-option" data-color="#ef4444" style="background: #ef4444;"></div>
            <div class="color-option" data-color="#8b5cf6" style="background: #8b5cf6;"></div>
            <div class="color-option" data-color="#ec4899" style="background: #ec4899;"></div>
            <div class="color-option" data-color="#06b6d4" style="background: #06b6d4;"></div>
            <div class="color-option" data-color="#6b7280" style="background: #6b7280;"></div>
          </div>
          <input type="hidden" id="tag-color" value="#4361ee">
        </div>
      </div>
      <div class="tag-modal-footer">
        <button class="btn-cancel" id="tag-cancel-btn">取消</button>
        <button class="btn-save" id="tag-save-btn">保存</button>
      </div>
    </div>
  </div>
  
  <!-- 收藏项标签选择模态框 -->
  <div id="favorite-tag-modal" class="tag-modal">
    <div class="tag-modal-content">
      <div class="tag-modal-header">
        <h3><i class="fas fa-folder"></i> 移动到分类</h3>
        <button class="tag-modal-close" id="favorite-tag-modal-close">&times;</button>
      </div>
      <div class="tag-modal-body">
        <div class="tag-select-list" id="tag-select-list">
          <!-- 标签选项将通过JS动态加载 -->
        </div>
        <input type="hidden" id="selected-post-id">
      </div>
    </div>
  </div>
  
  <script src="js/utils.js"></script>
  <script src="js/user.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/favorites.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      userManager.init();
      userManager.setupEventListeners();
      statsManager.init();
      favoritesManager.init();
    });
  </script>
</body>
</html>
